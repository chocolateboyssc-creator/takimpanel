<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri | Chocolate Boys FC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; }
        header { background: #e63946; color: white; padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo-area { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-area img { height: 40px; }
        nav a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .container { padding: 40px 5%; text-align: center; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .gallery-item { position: relative; overflow: hidden; border-radius: 15px; height: 250px; background: #222; border: 2px solid #333; transition: 0.3s; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .img-caption { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(230, 57, 70, 0.9); color: white; padding: 8px; font-size: 14px; font-weight: bold; }
        .wa-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #status-text { padding: 20px; color: #888; font-style: italic; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-area">
            <img src="images/logo.png" alt="CB">
            <h2>CHOCOLATE BOYS</h2>
        </a>
        <nav>
            <a href="index.html">ANA SAYFA</a>
            <a href="maclar.html">MAÇLAR</a>
            <a href="oyuncular.html">OYUNCULAR</a>
            <a href="galeri.html" style="border-bottom: 2px solid white;">GALERİ</a>
            <a href="store.html">STORE</a>
        </nav>
    </header>

    <div class="container">
        <h1 style="color: #e63946; text-transform: uppercase; font-weight: 900;">SAHADAN KARELER</h1>
        <div id="status-text">Fotoğraflar yükleniyor...</div>
        <div class="gallery-grid" id="gallery-container"></div>
    </div>

    <a href="#" id="wa-link" class="wa-float">
        <i class="fa-brands fa-whatsapp"></i> <span id="wa-text">TEKLİF ET</span>
    </a>

    <script>
        // 1. WHATSAPP AYARLARI (Panelden çekme)
        fetch('/content/ayarlar.json?t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                if(data.whatsapp_no) document.getElementById('wa-link').href = "https://wa.me/" + data.whatsapp_no.replace(/\D/g,'');
                if(data.btn_text) document.getElementById('wa-text').innerText = data.btn_text;
            }).catch(e => console.log("Ayarlar yüklenemedi."));

        // 2. GALERİ OTOMATİK YÜKLEME
        // DİKKAT: Buradaki repo isminin tam doğru olduğundan emin ol!
        const REPO_OWNER = "chocolateboyssc-creator"; 
        const REPO_NAME = "takimpanel"; 
        const FOLDER_PATH = "content/galeri";

        async function loadGallery() {
            const container = document.getElementById('gallery-container');
            const status = document.getElementById('status-text');

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FOLDER_PATH}`);
                
                if (!response.ok) throw new Error("GitHub klasörü bulamadı. Repo ismini kontrol et!");

                const files = await response.json();
                
                // Sadece JSON dosyalarını filtrele
                const jsonFiles = files.filter(file => file.name.endsWith('.json'));

                if (jsonFiles.length === 0) {
                    status.innerText = "Henüz fotoğraf eklenmemiş (Panelden 'Publish' yaptığından emin ol).";
                    return;
                }

                status.style.display = "none"; // Yükleniyor yazısını gizle

                for (const file of jsonFiles) {
                    const res = await fetch(file.download_url);
                    const photo = await res.json();
                    
                    // Kartı oluştur
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.innerHTML = `
                        <img src="${photo.image}" alt="${photo.title}" onerror="this.src='https://placehold.co/600x400?text=Resim+Yuklenemedi'">
                        <div class="img-caption">${photo.title || 'Chocolate Boys'}</div>
                    `;
                    container.appendChild(item);
                }
            } catch (err) {
                status.innerText = "Hata: " + err.message;
                status.style.color = "red";
            }
        }

        loadGallery();
    </script>
</body>
</html>
