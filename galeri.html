<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri | Chocolate Boys FC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* GENEL AYARLAR */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; line-height: 1.6; }
        
        /* HEADER */
        header { 
            background: #e63946; color: white; padding: 12px 5%; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-area img { height: 40px; }
        nav a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; font-size: 11px; text-transform: uppercase; }

        /* GALERİ TASARIMI */
        .container { padding: 40px 5%; text-align: center; }
        .page-title { font-size: 32px; color: #e63946; text-transform: uppercase; font-weight: 900; margin-bottom: 30px; }

        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
        }

        /* RESİM KARTLARI - TEMEL HALİ */
        .gallery-item { 
            position: relative;
            overflow: hidden; 
            border-radius: 15px; 
            height: 250px; 
            background: #222;
            cursor: pointer;
            border: 3px solid transparent; /* Başlangıçta şeffaf çerçeve */
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease; /* Yumuşak geçiş */
        }

        /* EFEKT: MOUSE ÜZERİNE GELİNCE (2-3 cm KÜÇÜLME VE ÇERÇEVE) */
        .gallery-item:hover { 
            transform: scale(0.92); /* Resmi %8 küçültür (O basılma hissi) */
            border-color: #e63946; /* Kırmızı çerçeve çıkar */
            box-shadow: 0 10px 30px rgba(230, 57, 70, 0.4); /* Kırmızımsı gölge */
        }

        /* Resmi Kartın İçine Tam Oturt */
        .gallery-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Kırpma yapar ama bozulmaz */
            transition: 0.3s; /* Resim kendi başına hareket etmesin */
        }

        /* Fotoğraf Başlığı Üstte Belirsin */
        .img-caption {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.7); color: white;
            padding: 10px; font-size: 14px; font-weight: bold;
            opacity: 0; /* Başlangıçta gizli */
            transition: 0.3s;
        }
        .gallery-item:hover .img-caption { opacity: 1; } /* Hoverda göster */

        /* TAM EKRAN (LIGHTBOX) MODAL */
        .lightbox {
            display: none; /* Başlangıçta gizli */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .lightbox.active { display: flex; opacity: 1; }

        .lightbox-img {
            max-width: 90%; max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(230, 57, 70, 0.3);
            transform: scale(0.9); transition: transform 0.3s ease;
        }
        .lightbox.active .lightbox-img { transform: scale(1); }

        .lightbox-close {
            position: absolute; top: 20px; right: 30px;
            color: white; font-size: 40px; cursor: pointer;
            transition: 0.3s;
        }
        .lightbox-close:hover { color: #e63946; transform: rotate(90deg); }

        /* WHATSAPP BUTONU */
        .wa-float { 
            position: fixed; bottom: 20px; right: 20px; 
            background: #25d366; color: white; padding: 15px 25px; 
            border-radius: 50px; text-decoration: none; font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000;
        }

        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); }
            .lightbox-close { top: 10px; right: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-area">
            <img src="images/logo.png" alt="CB">
            <h2>CHOCOLATE BOYS</h2>
        </a>
        <nav>
            <a href="index.html">ANA SAYFA</a>
            <a href="maclar.html">MAÇLAR</a>
            <a href="oyuncular.html">OYUNCULAR</a>
            <a href="galeri.html" style="border-bottom: 2px solid white;">GALERİ</a>
            <a href="store.html">STORE</a>
        </nav>
    </header>

    <div class="container">
        <h1 class="page-title">GALERİ</h1>
        <div id="status-text" style="color:#888;">Fotoğraflar yükleniyor...</div>
        <div class="gallery-grid" id="gallery-container">
            </div>
    </div>

    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <img src="" alt="" class="lightbox-img" id="lightbox-img">
    </div>

    <a href="#" id="wa-link" class="wa-float">
        <i class="fa-brands fa-whatsapp"></i> <span id="wa-text">TEKLİF ET</span>
    </a>

    <script>
        // 1. AYARLARI ÇEK
        fetch('/content/ayarlar.json?t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                if(data.whatsapp_no) document.getElementById('wa-link').href = "https://wa.me/" + data.whatsapp_no.replace(/\D/g,'');
                if(data.btn_text) document.getElementById('wa-text').innerText = data.btn_text;
            });

        // 2. .MD DOSYALARINI OKU VE LİSTELE
        const user = "chocolateboyssc-creator"; 
        const repo = "takimpanel"; 
        const path = "content/galeri";

        const container = document.getElementById('gallery-container');
        const status = document.getElementById('status-text');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        async function fetchGallery() {
            try {
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`);
                const files = await response.json();
                container.innerHTML = ""; 

                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        const contentRes = await fetch(file.download_url);
                        const text = await contentRes.text();
                        
                        const titleMatch = text.match(/title:\s*["']?(.*?)["']?\s*\n/);
                        const imageMatch = text.match(/image:\s*["']?(.*?)["']?\s*\n/);
                        
                        const title = titleMatch ? titleMatch[1] : "Chocolate Boys";
                        let image = imageMatch ? imageMatch[1] : "";

                        if(image && !image.startsWith('/') && !image.startsWith('http')) {
                            image = "/" + image;
                        }

                        if (image) {
                            // Kartı oluştur
                            const item = document.createElement('div');
                            item.className = 'gallery-item';
                            item.innerHTML = `
                                <img src="${image}" alt="${title}">
                                <div class="img-caption">${title}</div>
                            `;
                            
                            // TIKLAMA OLAYI: Tam Ekran Yap
                            item.addEventListener('click', () => {
                                lightboxImg.src = image; // Modal içindeki resmi değiştir
                                lightboxImg.alt = title;
                                lightbox.classList.add('active'); // Modalı göster
                            });

                            container.appendChild(item);
                        }
                    }
                }
                status.style.display = "none";
            } catch (err) { status.innerText = "Hata: Dosyalar okunamadı."; }
        }

        // TAM EKRAN KAPATMA OLAYLARI
        document.getElementById('lightbox-close').addEventListener('click', () => {
            lightbox.classList.remove('active'); // Modalı gizle
        });

        lightbox.addEventListener('click', (e) => {
            if(e.target === lightbox) lightbox.classList.remove('active'); // Resim dışına tıklayınca kapat
        });

        document.addEventListener('keydown', (e) => {
            if(e.key === "Escape" && lightbox.classList.contains('active')) lightbox.classList.remove('active'); // ESC ile kapat
        });

        fetchGallery();
    </script>
</body>
</html>
