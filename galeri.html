<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri | Chocolate Boys FC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        /* HEADER - MOBİL UYUMLU */
        header { 
            background: rgba(230, 57, 70, 0.95); 
            color: white; padding: 10px 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; 
            backdrop-filter: blur(15px);
        }
        .logo-area { display: flex; align-items: center; gap: 8px; text-decoration: none; color: white; flex-shrink: 0; }
        .logo-area img { height: 35px; }
        .logo-area h2 { font-size: 14px; letter-spacing: 0.5px; }

        nav { 
            display: flex; 
            overflow-x: auto; 
            white-space: nowrap; 
            padding: 5px 0;
            margin-left: 15px;
            -webkit-overflow-scrolling: touch;
        }
        nav::-webkit-scrollbar { display: none; } /* Kaydırma çubuğunu gizle */

        nav a { 
            color: white; text-decoration: none; 
            margin-left: 12px; font-weight: bold; font-size: 10px; 
            text-transform: uppercase; flex-shrink: 0;
        }
        nav a.active { border-bottom: 2px solid white; padding-bottom: 2px; }

        /* İÇERİK */
        .container { padding: 40px 5%; text-align: center; flex: 1; }
        .page-title { font-size: 32px; text-transform: uppercase; font-weight: 900; margin-bottom: 10px; text-shadow: 2px 4px 10px rgba(0,0,0,0.5); }
        .underline { width: 50px; height: 4px; background: #e63946; margin: 0 auto 30px; border-radius: 2px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        /* GALERİ KARTI - BUZLU CAM */
        .gallery-item { 
            position: relative; 
            overflow: hidden; 
            border-radius: 20px; 
            height: 250px; 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            cursor: pointer; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            transition: 0.3s ease; 
        }
        .gallery-item:hover { 
            transform: scale(0.96); /* İçeri basılma efekti */
            border-color: #e63946; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .gallery-item:hover img { transform: scale(1.1); }

        .gallery-caption {
            position: absolute; bottom: 0; width: 100%; 
            background: linear-gradient(transparent, rgba(0,0,0,0.8)); 
            padding: 15px; font-size: 13px; font-weight: bold;
        }

        /* LIGHTBOX */
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 80%; border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); }
        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }

        /* MOBİL ÖZEL */
        @media (max-width: 600px) {
            header { flex-direction: column; padding: 12px; }
            .logo-area { margin-bottom: 8px; }
            nav { width: 100%; justify-content: center; margin-left: 0; }
            .page-title { font-size: 24px; }
        }

        footer { background: rgba(0,0,0,0.8); color: #777; text-align: center; padding: 30px 20px; font-size: 12px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto; }
        
        .wa-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-area">
            <img src="images/logo.png" alt="CB">
            <h2>CHOCOLATE BOYS</h2>
        </a>
        <nav>
            <a href="index.html">ANA SAYFA</a>
            <a href="maclar.html">MAÇLAR</a>
            <a href="oyuncular.html">OYUNCULAR</a>
            <a href="galeri.html" class="active">GALERİ</a>
            <a href="store.html">STORE</a>
        </nav>
    </header>

    <div class="container">
        <h1 class="page-title">GALERİ</h1>
        <div class="underline"></div>
        <div id="status-text">Fotoğraflar yükleniyor...</div>
        <div class="gallery-grid" id="gallery-container"></div>
    </div>

    <div class="lightbox" id="lightbox">
        <span class="close-btn">&times;</span>
        <img src="" id="lightbox-img">
    </div>

    <a href="#" id="wa-link" class="wa-float">
        <i class="fa-brands fa-whatsapp"></i> <span id="wa-text">TEKLİF ET</span>
    </a>

    <footer>© 2026 Chocolate Boys FC. Tüm Hakları Saklıdır.</footer>

    <script>
        // Ayarlar & Arka Plan & WhatsApp
        fetch('/content/ayarlar.json?t=' + Date.now()).then(res => res.json()).then(data => {
            // Arka planı güncelle
            if(data.bg_image) {
                document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('${data.bg_image}')`;
            }
            // WhatsApp bilgilerini güncelle
            if(data.whatsapp_no) document.getElementById('wa-link').href = "https://wa.me/" + data.whatsapp_no.replace(/\D/g,'');
            if(data.btn_text) document.getElementById('wa-text').innerText = data.btn_text;
        });

        const user = "chocolateboyssc-creator", repo = "takimpanel", path = "content/galeri";
        const container = document.getElementById('gallery-container');
        const lightbox = document.getElementById('lightbox'), lbImg = document.getElementById('lightbox-img');

        async function fetchGallery() {
            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`);
                const files = await res.json();
                container.innerHTML = "";
                
                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        const contentRes = await fetch(file.download_url);
                        const text = await contentRes.text();
                        
                        const titleMatch = text.match(/title:\s*["']?(.*?)["']?\s*\n/);
                        const imageMatch = text.match(/image:\s*["']?(.*?)["']?\s*\n/);
                        
                        const title = titleMatch ? titleMatch[1] : "";
                        let image = imageMatch ? imageMatch[1] : "";
                        
                        if(image && !image.startsWith('/') && !image.startsWith('http')) image = "/" + image;
                        
                        if (image) {
                            const item = document.createElement('div');
                            item.className = 'gallery-item';
                            item.innerHTML = `
                                <img src="${image}">
                                <div class="gallery-caption">${title}</div>
                            `;
                            item.onclick = () => { lbImg.src = image; lightbox.classList.add('active'); };
                            container.appendChild(item);
                        }
                    }
                }
                document.getElementById('status-text').style.display = "none";
            } catch (err) { 
                console.log(err);
                document.getElementById('status-text').innerText = "Fotoğraflar yüklenirken bir hata oluştu.";
            }
        }

        document.querySelector('.close-btn').onclick = () => lightbox.classList.remove('active');
        lightbox.onclick = (e) => { if(e.target !== lbImg) lightbox.classList.remove('active'); };
        
        fetchGallery();
    </script>
</body>
</html>
