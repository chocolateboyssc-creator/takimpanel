<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri | Chocolate Boys FC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: #e63946; color: white; padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo-area { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-area img { height: 40px; }
        nav a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; font-size: 11px; text-transform: uppercase; }

        .container { padding: 40px 5%; text-align: center; flex: 1; }
        .page-title { font-size: 32px; color: #e63946; text-transform: uppercase; font-weight: 900; margin-bottom: 30px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        /* BASILMA EFEKTİ */
        .gallery-item { 
            position: relative; overflow: hidden; border-radius: 15px; height: 250px; background: #222; cursor: pointer; border: 3px solid transparent; 
            transition: transform 0.2s ease, border-color 0.2s, box-shadow 0.2s; 
        }
        .gallery-item:hover { 
            transform: scale(0.94); /* 2-3 cm içeri basılma hissi */
            border-color: #e63946; 
            box-shadow: 0 0 20px rgba(230, 57, 70, 0.4); 
        }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        /* TAM EKRAN MODAL */
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 85%; border-radius: 5px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }

        /* FOOTER - TÜM HAKLARI SAKLIDIR */
        footer { 
            background: #000; color: #777; text-align: center; padding: 30px 20px; 
            font-size: 13px; font-weight: bold; border-top: 1px solid #222; margin-top: auto; 
        }
        footer b { color: #e63946; }

        .wa-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 1000; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-area">
            <img src="images/logo.png" alt="CB">
            <h2>CHOCOLATE BOYS</h2>
        </a>
        <nav>
            <a href="index.html">ANA SAYFA</a>
            <a href="maclar.html">MAÇLAR</a>
            <a href="oyuncular.html">OYUNCULAR</a>
            <a href="galeri.html" style="border-bottom: 2px solid white;">GALERİ</a>
            <a href="store.html">STORE</a>
        </nav>
    </header>

    <div class="container">
        <h1 class="page-title">GALERİ</h1>
        <div id="status-text">Fotoğraflar yükleniyor...</div>
        <div class="gallery-grid" id="gallery-container"></div>
    </div>

    <div class="lightbox" id="lightbox">
        <span class="close-btn">&times;</span>
        <img src="" id="lightbox-img">
    </div>

    <a href="#" id="wa-link" class="wa-float">
        <i class="fa-brands fa-whatsapp"></i> <span id="wa-text">TEKLİF ET</span>
    </a>

    <footer>
        © 2026 Tüm Hakları Saklıdır.
    </footer>

    <script>
        // Ayarlar & WhatsApp
        fetch('/content/ayarlar.json?t=' + Date.now()).then(res => res.json()).then(data => {
            if(data.whatsapp_no) document.getElementById('wa-link').href = "https://wa.me/" + data.whatsapp_no.replace(/\D/g,'');
            if(data.btn_text) document.getElementById('wa-text').innerText = data.btn_text;
        });

        // Galeri Yükleme (.md okuma)
        const user = "chocolateboyssc-creator", repo = "takimpanel", path = "content/galeri";
        const container = document.getElementById('gallery-container');
        const lightbox = document.getElementById('lightbox'), lbImg = document.getElementById('lightbox-img');

        async function fetchGallery() {
            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`);
                const files = await res.json();
                container.innerHTML = "";
                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        const contentRes = await fetch(file.download_url);
                        const text = await contentRes.text();
                        const titleMatch = text.match(/title:\s*["']?(.*?)["']?\s*\n/);
                        const imageMatch = text.match(/image:\s*["']?(.*?)["']?\s*\n/);
                        const title = titleMatch ? titleMatch[1] : "";
                        let image = imageMatch ? imageMatch[1] : "";
                        if(image && !image.startsWith('/') && !image.startsWith('http')) image = "/" + image;
                        if (image) {
                            const item = document.createElement('div');
                            item.className = 'gallery-item';
                            item.innerHTML = `<img src="${image}"><div style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.6); padding:5px; font-size:12px;">${title}</div>`;
                            item.onclick = () => { lbImg.src = image; lightbox.classList.add('active'); };
                            container.appendChild(item);
                        }
                    }
                }
                document.getElementById('status-text').style.display = "none";
            } catch (err) { console.log(err); }
        }
        document.querySelector('.close-btn').onclick = () => lightbox.classList.remove('active');
        lightbox.onclick = (e) => { if(e.target !== lbImg) lightbox.classList.remove('active'); };
        fetchGallery();
    </script>
</body>
</html>
