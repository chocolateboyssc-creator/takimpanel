backend:
  name: github
  repo: chocolateboyssc-creator/takimpanel
  branch: main
  base_url: https://oauthproxy.chocolateboys-sc.workers.dev
  auth_endpoint: auth

media_folder: "images"
public_folder: "images"

collections:
  - name: "ayarlar"
    label: "Site Genel & Canlı Maç"
    delete: false
    editor:
      preview: false
    files:
      - label: "Ana Sayfa ve Canlı Skor Paneli"
        name: "site_text"
        file: "content/ayarlar.json"
        fields:
          - {label: "--- CANLI MAÇ AYARLARI ---", name: "info_live", widget: "hidden", default: "live"}
          - {label: "Canlı Maç Modu", name: "canli_mac", widget: "boolean", default: false}
          - {label: "Maç Başlangıç Saati", name: "baslangic_saati", widget: "datetime", format: "HH:mm", date_format: false, time_format: "HH:mm", hint: "Maçın başladığı saati gir, dakika otomatik sayar."}
          - {label: "Anlık Skor", name: "skor", widget: "string", default: "0 - 0"}
          - {label: "Canlı Maç Rakibi", name: "rakip", widget: "string", default: "Rakip"}
          - {label: "--- GENEL AYARLAR ---", name: "info_genel", widget: "hidden", default: "general"}
          - {label: "Ana Slogan", name: "slogan", widget: "string"}
          - {label: "Alt Slogan", name: "alt_slogan", widget: "string"}
          - {label: "WhatsApp Buton Yazısı", name: "btn_text", widget: "string", default: "BİZE HALISAHA TEKLİF ET"}
          - {label: "WhatsApp Numarası", name: "whatsapp_no", widget: "string"}
          - {label: "Arka Plan Resmi", name: "bg_image", widget: "image"}

  - name: "siradaki_mac"
    label: "Sıradaki Maç Paneli"
    delete: false
    files:
      - label: "Maç Bilgilerini Güncelle"
        name: "mac_bilgi"
        file: "content/mac.json"
        fields:
          - {label: "Bizim Takım", name: "ev_sahibi", widget: "string", default: "CHOCOLATE BOYS"}
          - {label: "Rakip Takım Adı", name: "rakip", widget: "string"}
          - {label: "Maç Tarihi", name: "mac_tarih", widget: "string"}
          - {label: "Maç Saati", name: "saat", widget: "string"}
          - {label: "Stadyum/Saha", name: "yer", widget: "string"}

  - name: "skorlar"
    label: "Geçmiş Maç Skorları"
    folder: "content/skorlar"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{rakip}}"
    fields:
      - {label: "Ev Sahibi", name: "ev_sahibi", widget: "string", default: "CHOCOLATE BOYS"}
      - {label: "Rakip Takım", name: "rakip", widget: "string"}
      - {label: "Maç Skoru", name: "skor", widget: "string"}
      - {label: "Sonuç", name: "sonuc", widget: "select", options: [{label: "Galibiyet", value: "win"}, {label: "Mağlubiyet", value: "loss"}, {label: "Beraberlik", value: "draw"}]}
      - {label: "Maç Tarihi", name: "date", widget: "datetime"}

  - name: "galeri"
    label: "Galeri Sayfası"
    folder: "content/galeri"
    create: true
    slug: "{{title}}"
    fields:
      - {label: "Fotoğraf Başlığı", name: "title", widget: "string"}
      - {label: "Fotoğraf Seç", name: "image", widget: "image"}

  - name: "kadro"
    label: "Takım Kadrosu"
    delete: false
    files:
      - label: "Tüm Oyuncuları Yönet"
        name: "liste"
        file: "content/oyuncular.json"
        format: "json"
        fields:
          - label: "Oyuncu Listesi"
            name: "players"
            widget: "list"
            fields:
              - {label: "Oyuncu Adı", name: "name", widget: "string"}
              - {label: "Mevki", name: "position", widget: "select", options: ["KALECİ", "DEFANS", "ORTA SAHA", "FORVET"]}
              - {label: "Oyuncu Fotoğrafı", name: "image", widget: "image", required: false}
              - {label: "Maç", name: "mac", widget: "number", default: 0}
              - {label: "Gol", name: "gol", widget: "number", default: 0}
              - {label: "Asist", name: "asist", widget: "number", default: 0}
