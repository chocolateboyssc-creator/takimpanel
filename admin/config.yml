backend:
  name: github
  repo: chocolateboyssc-creator/takimpanel
  branch: main
  base_url: https://oauthproxy.chocolateboys-sc.workers.dev
  auth_endpoint: auth

media_folder: "images"
public_folder: "/images"

collections:
  # 1. BÖLÜM: HABERLER
  - name: "haberler"
    label: "Haberler"
    folder: "content/haberler"
    create: true
    fields:
      - {label: "Başlık", name: "title", widget: "string"}
      - {label: "Tarih", name: "date", widget: "datetime"}
      - {label: "Haber Görseli", name: "image", widget: "image"}
      - {label: "Haber İçeriği", name: "body", widget: "markdown"}

  # 2. BÖLÜM: SIRADAKİ MAÇ (Ayarlar)
  - name: "maclar"
    label: "Sıradaki Maç"
    files:
      - label: "Maç Bilgileri"
        name: "mac_bilgi"
        file: "content/mac.json"
        fields:
          - {label: "Rakip Takım Adı", name: "rakip", widget: "string"}
          - {label: "Maç Tarihi ve Saati", name: "mac_tarih", widget: "string"}
          - {label: "Yer", name: "yer", widget: "string"}

  # 3. BÖLÜM: GALERİ (Sahadan Kareler)
  - name: "galeri"
    label: "Sahadan Kareler"
    folder: "content/galeri"
    create: true
    fields:
      - {label: "Fotoğraf Başlığı", name: "title", widget: "string"}
      - {label: "Fotoğraf", name: "image", widget: "image"}

  # 4. BÖLÜM: ANA SAYFA YAZILARI (Kırmızı Beyaz Aşk vb.)
  - name: "ayarlar"
    label: "Site Genel Ayarları"
    files:
      - label: "Ana Sayfa Yazıları"
        name: "site_text"
        file: "content/ayarlar.json"
        fields:
          - {label: "Ana Slogan (Kırmızı Beyaz Aşk)", name: "slogan", widget: "string"}
          - {label: "Alt Slogan", name: "alt_slogan", widget: "string"}
