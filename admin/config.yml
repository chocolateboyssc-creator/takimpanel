backend:
  name: github
  repo: chocolateboyssc-creator/takimpanel
  branch: main
  base_url: https://oauthproxy.chocolateboys-sc.workers.dev
  auth_endpoint: auth

media_folder: "images"
public_folder: "/images"

collections:
  - name: "ayarlar"
    label: "Site Genel Ayarları"
    delete: false
    files:
      - label: "Ana Sayfa ve Canlı Skor"
        name: "site_text"
        file: "content/ayarlar.json"
        fields:
          - {label: "Ana Slogan", name: "slogan", widget: "string"}
          - {label: "Alt Slogan", name: "alt_slogan", widget: "string"}
          - {label: "WhatsApp No", name: "whatsapp_no", widget: "string"}
          - {label: "Instagram Kullanıcı Adı", name: "instagram_username", widget: "string"}
          - {label: "Arka Plan Resmi", name: "bg_image", widget: "image"}
          - {label: "Canlı Maç Aktif Mi?", name: "canli_mac", widget: "boolean", default: false}
          - {label: "Canlı Rakip", name: "rakip", widget: "string", required: false}
          - {label: "Canlı Skor", name: "skor", widget: "string", default: "0 - 0"}
          - {label: "Dakika", name: "dakika", widget: "string", hint: "Sadece rakam yazın (Örn: 42)"}
          - {label: "Maç Durumu", name: "durum", widget: "string", hint: "Örn: Devre Arası"}

  - name: "siradaki_mac"
    label: "Sıradaki Maç (Normal Mod)"
    delete: false
    files:
      - label: "Maç Bilgileri"
        name: "mac_bilgi"
        file: "content/mac.json"
        fields:
          - {label: "Bizim Takım", name: "ev_sahibi", widget: "string", default: "CHOCOLATE BOYS"}
          - {label: "Rakip Takım", name: "rakip", widget: "string"}
          - {label: "Maç Tarihi", name: "mac_tarih", widget: "string"}
          - {label: "Maç Saati", name: "saat", widget: "string"}
          - {label: "Stadyum/Saha", name: "yer", widget: "string"}

  - name: "skorlar"
    label: "Geçmiş Maç Skorları"
    folder: "content/skorlar"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{rakip}}"
    fields:
      - {label: "Bizim Takım", name: "ev_sahibi", widget: "string", default: "CHOCOLATE BOYS"}
      - {label: "Rakip Takım", name: "rakip", widget: "string"}
      - {label: "Maç Skoru", name: "skor", widget: "string", hint: "Örn: 5 - 2"}
      - {label: "Sonuç", name: "sonuc", widget: "select", options: [{label: "Galibiyet", value: "win"}, {label: "Mağlubiyet", value: "loss"}, {label: "Beraberlik", value: "draw"}]}
      - {label: "Maç Tarihi", name: "date", widget: "datetime"}
      # --- Maç Detay Alanları ---
      - {label: "Maç Kadrosu", name: "kadro", widget: "string", hint: "İsimleri virgülle ayırın: Ali, Veli, Can"}
      - {label: "Goller", name: "goller", widget: "list", fields: [{label: "Detay", name: "detay", widget: "string", hint: "Örn: Ali 22'"}]}
      - {label: "Asistler", name: "asistler", widget: "list", fields: [{label: "Detay", name: "detay", widget: "string"}]}
      - {label: "Maç Notu (Detay İçin)", name: "body", widget: "markdown", required: false}

  - name: "kadro"
    label: "Takım Kadrosu"
    delete: false
    files:
      - label: "Oyuncuları Yönet"
        name: "liste"
        file: "content/oyuncular.json"
        fields:
          - label: "Oyuncu Listesi"
            name: "players"
            widget: "list"
            fields:
              - {label: "Adı", name: "name", widget: "string"}
              - {label: "Mevki", name: "position", widget: "select", options: ["KALECİ", "DEFANS", "ORTA SAHA", "FORVET"]}
              - {label: "Fotoğraf", name: "image", widget: "image", required: false}
              - {label: "Maç Sayısı", name: "mac", widget: "number", default: 0}
              - {label: "Gol", name: "gol", widget: "number", default: 0}
              - {label: "Asist", name: "asist", widget: "number", default: 0}
