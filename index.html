<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocolate Boys FC | Resmi Web Sitesi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; min-height: 100vh; display: flex; flex-direction: column; background-size: cover; background-position: center; background-attachment: fixed; transition: 0.5s; }
        header { background: rgba(230, 57, 70, 0.95); color: white; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px); }
        .logo-area { display: flex; align-items: center; gap: 8px; text-decoration: none; color: white; }
        .logo-area img { height: 35px; }
        nav { display: flex; overflow-x: auto; margin-left: 15px; }
        nav a { color: white; text-decoration: none; margin-left: 12px; font-weight: bold; font-size: 10px; text-transform: uppercase; white-space: nowrap; }
        
        .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
        .hero h1 { font-size: 45px; font-weight: 900; letter-spacing: -1px; line-height: 1; margin-bottom: 10px; text-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .hero p { font-size: 14px; opacity: 0.8; letter-spacing: 2px; margin-bottom: 30px; }

        .match-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; position: relative; }
        .live-mode { border: 2px solid #e63946; box-shadow: 0 0 20px rgba(230, 57, 70, 0.4); }
        .match-title { font-size: 12px; font-weight: 900; color: #e63946; margin-bottom: 20px; letter-spacing: 1px; }
        .live-dot { height: 8px; width: 8px; background-color: #e63946; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .teams { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 20px; }
        .team-name { flex: 1; font-weight: 900; font-size: 16px; text-transform: uppercase; }
        .vs-circle { background: #e63946; width: 60px; height: 60px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; box-shadow: 0 10px 20px rgba(230, 57, 70, 0.3); }
        
        .match-info { font-size: 13px; color: #ccc; display: flex; flex-direction: column; gap: 8px; }
        footer { background: #000; text-align: center; padding: 20px; font-size: 11px; border-top: 2px solid #e63946; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo-area"><img src="images/logo.png" alt="CB"></a>
        <nav>
            <a href="index.html" style="border-bottom:2px solid white">ANA SAYFA</a>
            <a href="maclar.html">MAÇLAR</a>
            <a href="oyuncular.html">OYUNCULAR</a>
            <a href="galeri.html">GALERİ</a>
            <a href="store.html">STORE</a>
        </nav>
    </header>

    <main class="hero">
        <h1 id="ana-slogan">CHOCOLATE BOYS</h1>
        <p id="alt-slogan">YÜKLELENİYOR...</p>

        <div id="main-match-card" class="match-card">
            <div id="match-title" class="match-title">YÜKLENİYOR...</div>
            <div class="teams">
                <div class="team-name" style="text-align:right;">CHOCOLATE BOYS</div>
                <div id="vs-element" class="vs-circle">VS</div>
                <div id="rakip-takim" class="team-name" style="text-align:left;">...</div>
            </div>
            <div class="match-info">
                <div id="normal-date-row"><span><i class="fa-solid fa-calendar"></i> <span id="mac-tarih">-</span></span></div>
                <div id="normal-place-row"><span><i class="fa-solid fa-location-dot"></i> <span id="mac-yer">-</span></span></div>
                <div id="timer-row" style="display:none; color:#e63946; font-weight:bold;">
                    <i class="fa-solid fa-clock"></i> <span id="match-min">0'</span>
                </div>
                <div id="match-status-row" style="display:none; text-transform:uppercase; font-size:11px;">
                    <span id="match-status">CANLI</span>
                </div>
            </div>
        </div>
    </main>

    <footer><p id="footer-copy">© 2026 Chocolate Boys FC</p></footer>

    <script>
        function updateUI() {
            fetch('/content/ayarlar.json?t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                // Sloganlar ve Arka Plan
                document.getElementById('ana-slogan').innerText = data.slogan;
                document.getElementById('alt-slogan').innerText = data.alt_slogan;
                document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('${data.bg_image}')`;
                
                const isLive = data.canli_mac === true;
                const matchCard = document.getElementById('main-match-card');

                if(isLive) {
                    matchCard.classList.add('live-mode');
                    document.getElementById('match-title').innerHTML = '<span class="live-dot"></span> CANLI SKOR';
                    document.getElementById('vs-element').innerText = data.skor;
                    document.getElementById('rakip-takim').innerText = data.rakip;
                    
                    document.getElementById('timer-row').style.display = "block";
                    document.getElementById('match-status-row').style.display = "block";
                    document.getElementById('normal-date-row').style.display = "none";
                    document.getElementById('normal-place-row').style.display = "none";
                    
                    document.getElementById('match-min').innerText = (data.dakika || "1") + "'";
                    document.getElementById('match-status').innerText = data.durum || "MAÇ DEVAM EDİYOR";
                } else {
                    matchCard.classList.remove('live-mode');
                    document.getElementById('match-title').innerText = 'SIRADAKİ RANDEVU';
                    document.getElementById('vs-element').innerText = "VS";

                    fetch('/content/mac.json?t=' + Date.now()).then(r => r.json()).then(m => {
                        document.getElementById('rakip-takim').innerText = m.rakip;
                        document.getElementById('mac-tarih').innerText = m.mac_tarih + " | " + m.saat;
                        document.getElementById('mac-yer').innerText = m.yer;
                        
                        document.getElementById('timer-row').style.display = "none";
                        document.getElementById('match-status-row').style.display = "none";
                        document.getElementById('normal-date-row').style.display = "block";
                        document.getElementById('normal-place-row').style.display = "block";
                    });
                }
            });
        }
        window.onload = updateUI;
    </script>
</body>
</html>
