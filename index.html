<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocolate Boys FC | Resmi Web Sitesi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* SIFIRLAMA VE AKICI KAYDIRMA */
        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            color: #fff; 
            line-height: 1.6; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            background-color: #121212;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background 0.5s ease-in-out;
        }
        
        /* HEADER / NAV - MOBİL UYUMLU */
        header { 
            background: rgba(230, 57, 70, 0.95); 
            color: white; padding: 10px 5%; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .logo-area { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .logo-area img { height: 35px; }
        .logo-area h2 { font-size: 14px; letter-spacing: 0.5px; }

        nav { 
            display: flex; 
            overflow-x: auto; 
            white-space: nowrap; 
            padding: 5px 0;
            margin-left: 15px;
            -webkit-overflow-scrolling: touch;
        }
        nav::-webkit-scrollbar { display: none; }

        nav a { 
            color: white; text-decoration: none; 
            margin-left: 12px; font-weight: bold; font-size: 10px; 
            text-transform: uppercase; flex-shrink: 0;
            opacity: 0.9;
            transition: 0.3s;
        }
        nav a:hover { opacity: 1; color: #1d3557; }

        /* HERO SECTION */
        .hero { 
            height: 400px; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white; text-align: center;
            padding: 20px;
        }
        .hero h1 { font-size: 42px; text-transform: uppercase; margin-bottom: 10px; text-shadow: 2px 4px 15px rgba(0,0,0,0.8); font-weight: 900; }
        .hero p { font-size: 16px; background: rgba(230, 57, 70, 0.9); padding: 6px 15px; border-radius: 5px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); text-transform: uppercase; font-weight: bold; }

        /* WHATSAPP BUTONU */
        .challenge-btn {
            display: inline-block; padding: 12px 30px; background-color: #25d366; 
            color: white; text-decoration: none; font-weight: bold; border-radius: 50px; 
            font-size: 16px; transition: 0.3s; border: 2px solid white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .challenge-btn:hover { transform: translateY(-5px) scale(1.05); background-color: #128c7e; }

        /* BAŞLIKLAR */
        .section-title { 
            border-left: 5px solid #e63946; padding-left: 15px; 
            margin: 40px 5% 20px 5%; font-size: 24px; font-weight: 800; 
            color: white;
            text-transform: uppercase; 
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        
        /* MAÇ KARTI & CANLI SKOR GÖRÜNÜMÜ */
        .match-card { 
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            margin: 0 5% 15px 5%; 
            padding: 30px 20px; 
            border-radius: 20px; 
            display: grid; 
            grid-template-columns: 1fr 80px 1fr; 
            align-items: center; 
            gap: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* CANLI MODU İÇİN ANİMASYONLU KENARLIK */
        .match-card.live-mode {
            border: 2px solid #e63946;
            animation: livePulse 2s infinite;
        }
        @keyframes livePulse { 0% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(230, 57, 70, 0); } 100% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0); } }

        .team h3 { font-size: 20px; color: #fff; font-weight: 900; text-transform: uppercase; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }
        #ev-sahibi { text-align: right; } 
        #rakip-takim { text-align: left; } 

        .vs-circle { 
            background: #e63946; color: white; width: 50px; height: 50px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-weight: 900; 
            margin: 0 auto; border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.5);
        }

        /* CANLI SKOR RAKAMI */
        .live-score-text { font-size: 32px; font-weight: 900; color: #fff; }

        .match-details { text-align: center; color: rgba(255,255,255,0.9); margin-bottom: 50px; font-weight: bold; }
        .match-details p { margin: 5px 0; font-size: 14px; }
        .match-details i { color: #e63946; margin-right: 5px; }

        /* CANLI DOT ANİMASYONU */
        .live-dot { width: 8px; height: 8px; background: #ff0000; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* FOOTER & INSTAGRAM LOGO */
        footer { 
            background: rgba(0, 0, 0, 0.85); 
            color: #ccc; text-align: center; padding: 40px 20px; 
            margin-top: auto; border-top: 2px solid #e63946; 
            font-size: 14px;
        }

        .footer-social {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .insta-btn {
            color: #fff;
            font-size: 28px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.8;
            text-decoration: none;
            display: inline-block;
        }

        .insta-btn:hover {
            opacity: 1;
            transform: scale(1.2) rotate(5deg);
            color: #E1306C;
            filter: drop-shadow(0 0 8px rgba(225, 48, 108, 0.6));
        }

        /* MOBİL DÜZENLEME */
        @media (max-width: 600px) {
            header { flex-direction: column; padding: 12px; }
            .logo-area { margin-bottom: 8px; }
            nav { width: 100%; justify-content: center; margin-left: 0; }
            .hero h1 { font-size: 28px; }
            .match-card { grid-template-columns: 1fr 50px 1fr; padding: 20px 10px; }
            .team h3 { font-size: 14px; }
            .vs-circle { width: 40px; height: 40px; font-size: 12px; }
            .live-score-text { font-size: 22px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="images/logo.png?v=3" alt="CB">
            <h2>CHOCOLATE BOYS</h2>
        </div>
        <nav>
            <a href="index.html" style="border-bottom: 2px solid white; padding-bottom: 2px;">ANA SAYFA</a>
            <a href="maclar.html">MAÇLAR</a>
            <a href="oyuncular.html">OYUNCULAR</a>
            <a href="galeri.html">GALERİ</a> 
            <a href="store.html">STORE</a>
        </nav>
    </header>

    <section class="hero">
        <h1 id="ana-slogan">YÜKLENİYOR...</h1>
        <p id="alt-slogan"></p>
        <a href="#" id="challenge-link" class="challenge-btn">
            <i class="fa-brands fa-whatsapp"></i> <span id="btn-text-el">TEKLİF ET</span>
        </a>
    </section>

    <div id="match-title" class="section-title">SIRADAKİ MAÇ</div>
    
    <div id="main-match-card" class="match-card">
        <div class="team"><h3 id="ev-sahibi">...</h3></div>
        <div class="vs-box-area">
            <div id="vs-element" class="vs-circle">VS</div>
        </div>
        <div class="team"><h3 id="rakip-takim">...</h3></div>
    </div>
    
    <div class="match-details">
        <p id="timer-row" style="display:none; color:#e63946;"><i class="fa-solid fa-stopwatch"></i> <span id="match-min">0'</span></p>
        <p><i class="fa-regular fa-calendar-days"></i> <span id="mac-tarih">---</span></p>
        <p><i class="fa-solid fa-location-dot"></i> <span id="mac-yer">---</span></p>
    </div>

    <footer>
        <p>© 2026 Chocolate Boys FC. Tüm Hakları Saklıdır.</p>
        <div class="footer-social">
            <a href="#" id="insta-link" class="insta-btn" target="_blank" title="Instagram'da Takip Et">
                <i class="fa-brands fa-instagram"></i>
            </a>
        </div>
    </footer>

    <script>
        function updateMatchUI() {
            fetch('/content/ayarlar.json?t=' + Date.now()).then(res => res.json()).then(data => {
                // Genel Ayarlar
                document.getElementById('ana-slogan').innerText = data.slogan || "KIRMIZI BEYAZ AŞK!";
                document.getElementById('alt-slogan').innerText = data.alt_slogan || "BİR TAKIMDAN DAHA FAZLASI";
                if(data.btn_text) document.getElementById('btn-text-el').innerText = data.btn_text;
                if(data.whatsapp_no) document.getElementById('challenge-link').href = "https://wa.me/" + data.whatsapp_no.replace(/\D/g,'');
                if(data.instagram_username) document.getElementById('insta-link').href = "https://www.instagram.com/" + data.instagram_username.replace('@', '');

                const bgUrl = data.bg_image || 'https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=1600';
                document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${bgUrl}')`;

                // CANLI MAÇ KONTROLÜ
                const matchCard = document.getElementById('main-match-card');
                const matchTitle = document.getElementById('match-title');
                const vsElement = document.getElementById('vs-element');
                const timerRow = document.getElementById('timer-row');

                if(data.canli_mac === true) {
                    matchTitle.innerHTML = '<span class="live-dot"></span>CANLI MAÇ';
                    matchCard.classList.add('live-mode');
                    vsElement.innerHTML = `<span class="live-score-text">${data.skor || '0-0'}</span>`;
                    vsElement.style.width = "auto";
                    vsElement.style.padding = "0 15px";
                    vsElement.style.borderRadius = "10px";
                    
                    // Dakika Sayacı
                    if(data.baslangic_saati) {
                        const now = new Date();
                        const [h, m] = data.baslangic_saati.split(':');
                        const start = new Date(); start.setHours(h, m, 0);
                        const diff = Math.floor((now - start) / 60000);
                        document.getElementById('match-min').innerText = (diff > 0 ? diff : 0) + "'";
                        timerRow.style.display = "block";
                    }
                    
                    // Canlı maçtaki takımları da ayarlardan çek
                    document.getElementById('ev-sahibi').innerText = "CHOCOLATE BOYS";
                    document.getElementById('rakip-takim').innerText = data.rakip || "RAKİP";
                } else {
                    // Canlı değilse normal maç verilerini çek
                    matchTitle.innerText = 'SIRADAKİ MAÇ';
                    matchCard.classList.remove('live-mode');
                    vsElement.innerText = 'VS';
                    vsElement.style.width = "50px";
                    vsElement.style.padding = "0";
                    vsElement.style.borderRadius = "50%";
                    timerRow.style.display = "none";
                    
                    fetch('/content/mac.json?t=' + Date.now()).then(res => res.json()).then(macData => {
                        document.getElementById('ev-sahibi').innerText = macData.ev_sahibi || "CHOCOLATE BOYS";
                        document.getElementById('rakip-takim').innerText = macData.rakip || "RAKİP TAKIM";
                        document.getElementById('mac-tarih').innerText = macData.mac_tarih || "Tarih Belirlenmedi";
                        document.getElementById('mac-yer').innerText = macData.yer || "Saha Belirlenmedi";
                    });
                }
            });
        }

        // İlk yükleme ve her 30 saniyede bir güncelleme
        updateMatchUI();
        setInterval(updateMatchUI, 30000);
    </script>
</body>
</html>
