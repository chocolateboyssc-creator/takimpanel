<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store | Chocolate Boys FC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #121212; 
            color: #fff; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* HEADER */
        header { 
            background: rgba(230, 57, 70, 0.9); 
            padding: 12px 5%; 
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(10px);
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-area img { height: 40px; }
        nav a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; font-size: 11px; text-transform: uppercase; }

        /* MERKEZ MESAJ */
        .store-overlay {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .message-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .message-card i { font-size: 60px; color: #e63946; margin-bottom: 20px; }
        .message-card h1 { font-size: 32px; text-transform: uppercase; margin-bottom: 15px; }
        .message-card p { color: #ccc; line-height: 1.6; font-size: 18px; }
        
        .timer-info {
            margin-top: 25px;
            display: inline-block;
            border: 1px dashed #e63946;
            padding: 10px 20px;
            border-radius: 10px;
            color: #e63946;
            font-weight: bold;
            font-size: 14px;
        }

        footer { background: rgba(0, 0, 0, 0.8); color: #aaa; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="images/logo.png?v=3" alt="CB">
            <h2>CHOCOLATE BOYS</h2>
        </div>
        <nav>
            <a href="index.html">ANA SAYFA</a>
            <a href="maclar.html">MAÇLAR</a>
            <a href="oyuncular.html">OYUNCULAR</a>
            <a href="galeri.html">GALERİ</a> 
            <a href="store.html">STORE</a>
        </nav>
    </header>

    <div class="store-overlay">
        <div class="message-card">
            <i class="fa-solid fa-shirt"></i>
            <h1>STORE ÇOK YAKINDA!</h1>
            <p>Chocolate Boys SC resmi formaları ve ürünleri çok yakında burada satışa sunulacak. Takımını desteklemek için takipte kal!</p>
            <div class="timer-info">HAZIRLIKLAR DEVAM EDİYOR...</div>
        </div>
    </div>

    <footer>© 2026 Chocolate Boys FC. Tüm Hakları Saklıdır.</footer>

    <script>
        // Arka planı yine ana ayarlardan çekiyoruz ki sırıtmasın
        fetch('/content/ayarlar.json').then(res => res.json()).then(data => {
            const bgUrl = data.bg_image || 'https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=1600';
            document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('${bgUrl}')`;
        });
    </script>
</body>
</html>
