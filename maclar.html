<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maçlar | Chocolate Boys FC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- GENEL TASARIM --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f0f0f; 
            color: #ffffff; 
            line-height: 1.6;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER & NAV --- */
        header { 
            background: rgba(230, 57, 70, 0.98); 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .logo-area { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .logo-area img { height: 45px; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3)); }
        .logo-area h1 { font-size: 18px; font-weight: 900; letter-spacing: 1px; }

        nav { display: flex; gap: 20px; }
        nav a { 
            color: white; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 12px; 
            text-transform: uppercase; 
            transition: 0.3s; 
            opacity: 0.8;
            padding-bottom: 5px;
        }
        nav a:hover, nav a.active { opacity: 1; border-bottom: 3px solid white; }

        /* --- ANA KONTEYNER --- */
        .container { padding: 50px 5%; max-width: 1100px; margin: 0 auto; width: 100%; flex: 1; }
        .section-header { margin-bottom: 30px; border-left: 6px solid #e63946; padding-left: 20px; }
        .section-header h2 { font-size: 28px; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }

        /* --- CANLI MAÇ KARTI (YENİLENMİŞ) --- */
        .live-card {
            background: linear-gradient(135deg, rgba(20,20,20,0.9), rgba(40,40,40,0.8));
            border-radius: 25px;
            padding: 50px 30px;
            margin-bottom: 60px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .live-card.active { border: 2px solid #e63946; animation: glow 2s infinite ease-in-out; }
        @keyframes glow {
            0% { box-shadow: 0 0 5px rgba(230, 57, 70, 0.2); }
            50% { box-shadow: 0 0 25px rgba(230, 57, 70, 0.6); }
            100% { box-shadow: 0 0 5px rgba(230, 57, 70, 0.2); }
        }

        .match-main { display: flex; justify-content: space-around; align-items: center; gap: 20px; }
        .team { flex: 1; text-align: center; }
        .team h3 { font-size: 24px; font-weight: 900; text-transform: uppercase; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .score-display { 
            background: #e63946; 
            color: white; 
            font-size: 48px; 
            font-weight: 950; 
            padding: 10px 30px; 
            border-radius: 15px; 
            min-width: 140px; 
            text-align: center;
            box-shadow: 0 8px 20px rgba(230, 57, 70, 0.4);
        }

        .match-info-bar { 
            margin-top: 30px; 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            font-weight: 700; 
            color: #ddd;
            font-size: 15px;
        }
        .match-info-bar span i { color: #e63946; margin-right: 8px; }
        .live-badge { color: #e63946; animation: blink 1.2s infinite; font-weight: 900; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* --- GEÇMİŞ MAÇLAR LİSTESİ --- */
        .history-grid { display: grid; gap: 15px; }
        .history-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 30px;
            border-radius: 15px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .history-card:hover { 
            background: rgba(230, 57, 70, 0.1); 
            transform: translateY(-3px); 
            border-color: #e63946; 
        }
        .mini-score {
            background: rgba(230, 57, 70, 1);
            padding: 6px 15px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 18px;
            min-width: 80px;
            text-align: center;
            margin: 0 20px;
        }

        /* --- MODAL (DETAY PENCERESİ) --- */
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); }
        .modal-content { 
            background: #1a1a1a; 
            margin: 5% auto; 
            padding: 40px; 
            border: 1px solid #e63946; 
            width: 90%; 
            max-width: 600px; 
            border-radius: 25px; 
            position: relative; 
            max-height: 85vh; 
            overflow-y: auto;
        }
        .close-btn { position: absolute; right: 25px; top: 20px; font-size: 35px; cursor: pointer; color: #e63946; transition: 0.3s; }
        .close-btn:hover { transform: rotate(90deg); }

        .detail-box { margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .detail-box h4 { color: #e63946; text-transform: uppercase; margin-bottom: 15px; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .player-list { display: grid; grid-template-columns: 1fr 1fr; list-style: none; gap: 8px; }
        .player-list li { font-size: 15px; color: #eee; }

        footer { background: #000; padding: 40px; text-align: center; border-top: 3px solid #e63946; margin-top: auto; color: #777; font-size: 14px; }

        @media (max-width: 768px) {
            .match-main { flex-direction: column; }
            .score-display { order: -1; margin-bottom: 15px; }
            .history-card { grid-template-columns: 1fr; text-align: center; gap: 10px; }
            .mini-score { width: fit-content; margin: 10px auto; }
            nav { display: none; } /* Mobilde basitlik için gizlendi */
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-area">
            <img src="images/logo.png" alt="CB">
            <h1>CHOCOLATE BOYS FC</h1>
        </a>
        <nav>
            <a href="index.html">ANA SAYFA</a>
            <a href="maclar.html" class="active">MAÇLAR</a>
            <a href="oyuncular.html">OYUNCULAR</a>
            <a href="galeri.html">GALERİ</a>
        </nav>
    </header>

    <div class="container">
        <div class="section-header">
            <h2 id="live-title">SIRADAKİ RANDEVU</h2>
        </div>

        <div id="main-match-box" class="live-card">
            <div class="match-main">
                <div class="team"><h3 id="home-name">CHOCOLATE BOYS</h3></div>
                <div class="score-display" id="main-score">VS</div>
                <div class="team"><h3 id="away-name">...</h3></div>
            </div>
            <div id="main-match-meta" class="match-info-bar">
                </div>
        </div>

        <div class="section-header">
            <h2>GEÇMİŞ MAÇ SONUÇLARI</h2>
        </div>
        <div class="history-grid" id="history-list">
            </div>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-content-area"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Chocolate Boys Football Club. Tüm Hakları Saklıdır.</p>
    </footer>

    <script>
        // --- AYARLARI VE CANLI MAÇI ÇEK ---
        async function loadMainData() {
            try {
                const resA = await fetch('/content/ayarlar.json?t=' + Date.now());
                const ayarlar = await resA.json();
                
                // Arka planı ayarla
                if(ayarlar.bg_image) document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('${ayarlar.bg_image}')`;

                if (ayarlar.canli_mac === true) {
                    document.getElementById('live-title').innerHTML = '<span class="live-badge">●</span> CANLI SKOR';
                    document.getElementById('main-match-box').classList.add('active');
                    document.getElementById('away-name').innerText = ayarlar.rakip || "RAKİP";
                    document.getElementById('main-score').innerText = ayarlar.skor || "0-0";
                    document.getElementById('main-match-meta').innerHTML = `
                        <span class="live-badge"><i class="fa-solid fa-stopwatch"></i> DAKİKA: ${ayarlar.dakika || '1'}</span>
                        <span>|</span>
                        <span>${ayarlar.durum || 'MAÇ DEVAM EDİYOR'}</span>
                    `;
                } else {
                    const resM = await fetch('/content/mac.json?t=' + Date.now());
                    const m = await resM.json();
                    document.getElementById('away-name').innerText = m.rakip || "Rakip Bekleniyor";
                    document.getElementById('main-match-meta').innerHTML = `
                        <span><i class="fa-solid fa-calendar-days"></i> ${m.mac_tarih || 'Tarih Yok'}</span>
                        <span><i class="fa-solid fa-clock"></i> ${m.saat || '--:--'}</span>
                        <span><i class="fa-solid fa-location-arrow"></i> ${m.yer || 'Saha Belirlenmedi'}</span>
                    `;
                }
            } catch (e) { console.error("Ana veri hatası"); }
            loadHistory();
        }

        // --- GEÇMİŞ MAÇLARI GITHUB'DAN ÇEK ---
        async function loadHistory() {
            const list = document.getElementById('history-list');
            try {
                const response = await fetch(`https://api.github.com/repos/chocolateboyssc-creator/takimpanel/contents/content/skorlar?t=` + Date.now());
                const files = await response.json();
                list.innerHTML = "";
                
                const mdFiles = files.filter(f => f.name.endsWith('.md')).reverse();

                for (const file of mdFiles) {
                    const res = await fetch(file.download_url);
                    const text = await res.text();
                    
                    const getVal = (key) => {
                        const regex = new RegExp(`^${key}:\\s*(.*)`, 'im');
                        const match = text.match(regex);
                        return match ? match[1].replace(/"/g, '').trim() : '';
                    };

                    const matchData = {
                        ev: getVal('ev_sahibi') || "CB FC",
                        rakip: getVal('rakip'),
                        skor: getVal('skor'),
                        kadro: getVal('kadro'),
                        detaylar: Array.from(text.matchAll(/^\s*-\s*detay:\s*(.*)/gm)).map(m => m[1]),
                        notlar: text.split('---').pop().trim()
                    };

                    const card = document.createElement('div');
                    card.className = 'history-card';
                    card.onclick = () => showDetails(matchData);
                    card.innerHTML = `
                        <div style="text-align:right; font-weight:900;">${matchData.ev}</div>
                        <div class="mini-score">${matchData.skor}</div>
                        <div style="text-align:left; font-weight:900;">${matchData.rakip}</div>
                    `;
                    list.appendChild(card);
                }
            } catch (e) { list.innerHTML = "<p>Maç sonuçları şu an yüklenemiyor.</p>"; }
        }

        // --- MODAL AÇMA ---
        function showDetails(d) {
            const modal = document.getElementById('detailsModal');
            const area = document.getElementById('modal-content-area');
            
            const pList = d.kadro ? d.kadro.split(',').map(p => `<li>• ${p.trim()}</li>`).join('') : "<li>Kadro girilmemiş.</li>";
            const gList = d.detaylar.length > 0 ? d.detaylar.map(g => `<li>⚽ ${g}</li>`).join('') : "<li>Gol bilgisi yok.</li>";

            area.innerHTML = `
                <h2 style="text-align:center; color:#e63946; font-size:28px; margin-bottom:25px;">${d.ev} ${d.skor} ${d.rakip}</h2>
                <div class="detail-box">
                    <h4><i class="fa-solid fa-users"></i> MAÇ KADROSU</h4>
                    <ul class="player-list">${pList}</ul>
                </div>
                <div class="detail-box">
                    <h4><i class="fa-solid fa-circle-info"></i> MAÇ DETAYLARI</h4>
                    <ul style="list-style:none; font-size:15px;">${gList}</ul>
                </div>
                <div class="detail-box" style="border:none;">
                    <h4><i class="fa-solid fa-quote-left"></i> EDİTÖRÜN NOTU</h4>
                    <p style="font-size:14px; color:#aaa; font-style:italic;">${d.notlar || 'Bu maç için not girilmemiş.'}</p>
                </div>
            `;
            modal.style.display = "block";
        }

        // --- MODAL KAPATMA ---
        document.querySelector('.close-btn').onclick = () => document.getElementById('detailsModal').style.display = "none";
        window.onclick = (e) => { if(e.target.id == 'detailsModal') document.getElementById('detailsModal').style.display = "none"; }

        // Başlat
        loadMainData();
    </script>
</body>
</html>
