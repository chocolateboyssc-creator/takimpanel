<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maçlar | Chocolate Boys FC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        header { 
            background: rgba(230, 57, 70, 0.95); 
            color: white; padding: 10px 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; 
            backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .logo-area { display: flex; align-items: center; gap: 8px; text-decoration: none; color: white; flex-shrink: 0; }
        .logo-area img { height: 35px; }
        .logo-area h2 { font-size: 14px; letter-spacing: 0.5px; }

        nav { display: flex; overflow-x: auto; white-space: nowrap; padding: 5px 0; margin-left: 15px; -webkit-overflow-scrolling: touch; }
        nav::-webkit-scrollbar { display: none; }
        nav a { color: white; text-decoration: none; margin-left: 12px; font-weight: bold; font-size: 10px; text-transform: uppercase; flex-shrink: 0; opacity: 0.9; transition: 0.3s; }
        nav a.active { border-bottom: 2px solid white; padding-bottom: 2px; opacity: 1; }

        .container { padding: 40px 5%; flex: 1; }
        .section-title { font-size: 26px; color: #fff; text-transform: uppercase; font-weight: 900; margin-bottom: 20px; border-left: 5px solid #e63946; padding-left: 15px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        /* CANLI MAÇ KARTI */
        .next-match { 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px 20px; 
            border-radius: 20px; 
            text-align: center; 
            margin-bottom: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.5s;
        }
        
        .live-match { border: 2px solid #e63946; animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(230, 57, 70, 0); }
            100% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0); }
        }

        .match-grid { display: grid; grid-template-columns: 1fr 100px 1fr; align-items: center; gap: 20px; }
        .team-info h3 { font-size: 22px; text-transform: uppercase; font-weight: 900; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }
        .team-left { text-align: right; } 
        .team-right { text-align: left; }

        .vs-box { 
            background: #e63946; min-width: 55px; height: 55px; border-radius: 27px; 
            display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; 
            margin: 0 auto; box-shadow: 0 0 20px rgba(230, 57, 70, 0.5); border: 2px solid rgba(255,255,255,0.3); padding: 0 10px;
        }

        .match-meta { margin-top: 25px; color: #ccc; font-size: 14px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; font-weight: bold; }
        .match-meta i { color: #e63946; }

        /* GEÇMİŞ SKORLAR */
        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .history-item { 
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); padding: 15px 25px; border-radius: 15px;
            display: grid; grid-template-columns: 1fr 100px 1fr; align-items: center; gap: 15px; 
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; cursor: pointer;
        }
        .history-item:hover { transform: scale(1.02); border-color: #e63946; background: rgba(0,0,0,0.6); }
        
        .score-pill { 
            font-size: 18px; font-weight: 900; background: #e63946; padding: 5px 12px; border-radius: 8px; 
            text-align: center; margin: 0 auto; min-width: 75px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .win { border-left: 6px solid #25d366 !important; }
        .loss { border-left: 6px solid #e63946 !important; }
        .draw { border-left: 6px solid #f1faee !important; }

        /* MODAL (DETAY PENCERESİ) */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .modal-content { background: #1a1a1a; margin: 5% auto; padding: 30px; border: 1px solid #e63946; width: 90%; max-width: 550px; border-radius: 20px; position: relative; color: white; max-height: 85vh; overflow-y: auto; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 30px; cursor: pointer; color: #e63946; }
        .detail-section { margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .detail-section h4 { color: #e63946; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .detail-list { list-style: none; padding-left: 0; }
        .detail-list li { margin-bottom: 5px; font-size: 14px; opacity: 0.9; }

        footer { background: rgba(0, 0, 0, 0.85); color: #ccc; text-align: center; padding: 40px 20px; font-size: 14px; border-top: 2px solid #e63946; margin-top: auto; }
        .footer-social { margin-top: 15px; display: flex; justify-content: center; gap: 20px; }
        .insta-btn { color: #fff; font-size: 28px; transition: 0.3s; opacity: 0.8; text-decoration: none; }
        .insta-btn:hover { opacity: 1; transform: scale(1.2); color: #E1306C; }

        @media (max-width: 600px) {
            header { flex-direction: column; padding: 12px; }
            nav { width: 100%; justify-content: center; margin-left: 0; margin-top: 10px; }
            .match-grid { grid-template-columns: 1fr 65px 1fr; gap: 10px; }
            .team-info h3 { font-size: 14px; }
            .vs-box { min-width: 50px; height: 50px; font-size: 14px; }
            .history-item { grid-template-columns: 1fr 85px 1fr; padding: 12px 10px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-area">
            <img src="images/logo.png" alt="CB">
            <h2>CHOCOLATE BOYS</h2>
        </a>
        <nav>
            <a href="index.html">ANA SAYFA</a>
            <a href="maclar.html" class="active">MAÇLAR</a>
            <a href="oyuncular.html">OYUNCULAR</a>
            <a href="galeri.html">GALERİ</a>
            <a href="store.html">STORE</a>
        </nav>
    </header>

    <div class="container">
        <h2 id="match-title" class="section-title">SIRADAKİ RANDEVU</h2>
        <div id="next-match-card" class="next-match">
            <div class="match-grid">
                <div class="team-info team-left"><h3 id="ev-ad">CHOCOLATE BOYS</h3></div>
                <div id="vs-box-main" class="vs-box">VS</div>
                <div class="team-info team-right"><h3 id="rakip-ad">...</h3></div>
            </div>
            <div id="match-details" class="match-meta">
                <span><i class="fa-solid fa-calendar"></i> <span id="mac-gun">---</span></span>
                <span><i class="fa-solid fa-clock"></i> <span id="mac-saat">---</span></span>
                <span><i class="fa-solid fa-location-dot"></i> <span id="mac-saha">---</span></span>
            </div>
        </div>

        <h2 class="section-title">GEÇMİŞ SONUÇLAR</h2>
        <div class="history-list" id="history-container">
            <p style="color:#aaa; text-align: center;">Skorlar güncelleniyor...</p>
        </div>
    </div>

    <div id="matchModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <footer>
        <p>© 2026 Chocolate Boys FC. Tüm Hakları Saklıdır.</p>
        <div class="footer-social">
            <a href="#" id="insta-link" class="insta-btn" target="_blank">
                <i class="fa-brands fa-instagram"></i>
            </a>
        </div>
    </footer>

    <script>
        async function init() {
            try {
                // Ayarları Çek
                const resAyarlar = await fetch('/content/ayarlar.json?t=' + Date.now());
                const ayarlar = await resAyarlar.json();
                
                // Arka Planı Ayarla
                const bgUrl = ayarlar.bg_image || 'https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=1600';
                document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('${bgUrl}')`;
                
                // Instagram Linki
                if(ayarlar.instagram_username) {
                    document.getElementById('insta-link').href = "https://www.instagram.com/" + ayarlar.instagram_username.replace('@', '');
                }

                // Canlı Maç Modu Kontrolü
                if (ayarlar.canli_mac === true) {
                    document.getElementById('match-title').innerHTML = '<span style="color:#e63946">●</span> CANLI SKOR';
                    document.getElementById('next-match-card').classList.add('live-match');
                    document.getElementById('ev-ad').innerText = "CHOCOLATE BOYS";
                    document.getElementById('rakip-ad').innerText = ayarlar.rakip || "RAKİP";
                    document.getElementById('vs-box-main').innerText = ayarlar.skor || "0 - 0";
                    document.getElementById('match-details').innerHTML = `<span><i class="fa-solid fa-stopwatch"></i> MAÇ ŞU AN OYNANIYOR</span>`;
                } else {
                    // Normal Sıradaki Maç Bilgisi
                    const resMac = await fetch('/content/mac.json?t=' + Date.now());
                    const macData = await resMac.json();
                    document.getElementById('ev-ad').innerText = macData.ev_sahibi || "CHOCOLATE BOYS";
                    document.getElementById('rakip-ad').innerText = macData.rakip || "Rakip Bekleniyor";
                    document.getElementById('mac-gun').innerText = macData.mac_tarih || "Tarih Belirlenmedi";
                    document.getElementById('mac-saat').innerText = macData.saat || "--:--";
                    document.getElementById('mac-saha').innerText = macData.yer || "Saha Belirlenmedi";
                }
            } catch (e) { console.error("Ayarlar yüklenemedi"); }
            loadScores();
        }

        async function loadScores() {
            const container = document.getElementById('history-container');
            try {
                const response = await fetch(`https://api.github.com/repos/chocolateboyssc-creator/takimpanel/contents/content/skorlar?t=` + Date.now());
                const files = await response.json();
                
                container.innerHTML = "";
                const mdFiles = files.filter(f => f.name.endsWith('.md')).reverse();

                for (const file of mdFiles) {
                    const res = await fetch(file.download_url);
                    const rawText = await res.text();
                    
                    const getVal = (key) => {
                        const regex = new RegExp(`${key}:\\s*(.*)`, 'i');
                        const match = rawText.match(regex);
                        return match ? match[1].replace(/"/g, '').trim() : null;
                    };

                    const matchData = {
                        ev: getVal('ev_sahibi') || "CHOCOLATE BOYS",
                        rakip: getVal('rakip') || "Rakip",
                        skor: getVal('skor') || "0-0",
                        sonuc: getVal('sonuc') || "draw",
                        kadro: getVal('kadro'),
                        goller: Array.from(rawText.matchAll(/detay:\s*(.*)/gi)).map(m => m[1].replace(/"/g, '').trim()),
                        notlar: rawText.split('---').pop().trim()
                    };

                    const item = document.createElement('div');
                    item.className = `history-item ${matchData.sonuc}`;
                    item.onclick = () => openMatchDetails(matchData);
                    item.innerHTML = `
                        <div style="text-align:right; font-weight:900; text-transform:uppercase;">${matchData.ev}</div>
                        <div class="score-pill">${matchData.skor}</div>
                        <div style="text-align:left; font-weight:900; text-transform:uppercase;">${matchData.rakip}</div>
                    `;
                    container.appendChild(item);
                }
            } catch(e) { container.innerHTML = "<p style='text-align:center'>Henüz kayıtlı maç sonucu bulunmuyor.</p>"; }
        }

        function openMatchDetails(data) {
            const modal = document.getElementById('matchModal');
            const body = document.getElementById('modal-body');
            
            const kadroList = data.kadro ? data.kadro.split(',').map(p => `<li>• ${p.trim()}</li>`).join('') : "<li>Belirtilmedi</li>";
            const gollerList = data.goller.length > 0 ? data.goller.map(g => `<li>⚽ ${g}</li>`).join('') : "<li>Veri yok</li>";

            body.innerHTML = `
                <h2 style="text-align:center; margin-bottom:20px; color:#e63946;">${data.ev} ${data.skor} ${data.rakip}</h2>
                <div class="detail-section">
                    <h4><i class="fa-solid fa-users"></i> MAÇ KADROSU</h4>
                    <ul class="detail-list" style="display:grid; grid-template-columns: 1fr 1fr;">${kadroList}</ul>
                </div>
                <div class="detail-section">
                    <h4><i class="fa-solid fa-futbol"></i> GOL & ASİST DETAYLARI</h4>
                    <ul class="detail-list">${gollerList}</ul>
                </div>
                <div class="detail-section" style="border:none;">
                    <h4><i class="fa-solid fa-comment"></i> MAÇ NOTLARI</h4>
                    <p style="font-size:14px; line-height:1.6; opacity:0.8;">${data.notlar && data.notlar.length > 5 ? data.notlar : "Not girilmemiş."}</p>
                </div>
            `;
            modal.style.display = "block";
        }

        // Modal Kapatma Olayları
        document.querySelector('.close-modal').onclick = () => document.getElementById('matchModal').style.display = "none";
        window.onclick = (e) => { if (e.target.id == 'matchModal') document.getElementById('matchModal').style.display = "none"; }

        // Başlat
        init();
    </script>
</body>
</html>
