<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maçlar | Chocolate Boys FC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: #e63946; color: white; padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo-area { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-area img { height: 40px; }
        nav a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; font-size: 11px; text-transform: uppercase; }

        .container { padding: 40px 5%; flex: 1; }
        .section-title { font-size: 28px; color: #e63946; text-transform: uppercase; font-weight: 900; margin-bottom: 20px; border-left: 5px solid #e63946; padding-left: 15px; }

        /* SIRADAKİ MAÇ KARTI */
        .next-match { 
            background: linear-gradient(135deg, #1d3557 0%, #457b9d 100%);
            padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #e63946;
        }
        .match-grid { display: flex; justify-content: space-around; align-items: center; gap: 20px; }
        .team-info h3 { font-size: 24px; text-transform: uppercase; }
        .vs-box { background: #e63946; padding: 10px 20px; border-radius: 10px; font-weight: 900; font-size: 20px; }
        .match-meta { margin-top: 20px; color: #f1faee; font-size: 14px; display: flex; justify-content: center; gap: 20px; }

        /* GEÇMİŞ MAÇLAR LİSTESİ */
        .history-list { display: flex; flex-direction: column; gap: 15px; }
        .history-item { 
            background: #1a1a1a; padding: 15px 25px; border-radius: 12px;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            border-left: 4px solid #333; transition: 0.3s;
        }
        .history-item:hover { transform: translateX(10px); border-left-color: #e63946; background: #222; }
        .score { font-family: 'Courier New', Courier, monospace; font-size: 22px; font-weight: bold; background: #333; padding: 5px 15px; border-radius: 5px; min-width: 80px; text-align: center; margin: 0 20px; }
        .win { border-left-color: #25d366 !important; } /* Galibiyet durumu */
        .loss { border-left-color: #e63946 !important; } /* Mağlubiyet durumu */

        footer { background: #000; color: #777; text-align: center; padding: 30px 20px; border-top: 1px solid #222; margin-top: 50px; font-weight: bold; font-size: 13px; }

        @media (max-width: 768px) {
            .match-grid { flex-direction: column; }
            .history-item { grid-template-columns: 1fr; text-align: center; gap: 10px; }
            .score { margin: 10px auto; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-area">
            <img src="images/logo.png" alt="CB">
            <h2>CHOCOLATE BOYS</h2>
        </a>
        <nav>
            <a href="index.html">ANA SAYFA</a>
            <a href="maclar.html" style="border-bottom: 2px solid white;">MAÇLAR</a>
            <a href="oyuncular.html">OYUNCULAR</a>
            <a href="galeri.html">GALERİ</a>
            <a href="store.html">STORE</a>
        </nav>
    </header>

    <div class="container">
        <h2 class="section-title">SIRADAKİ RANDEVU</h2>
        <div class="next-match">
            <div class="match-grid">
                <div class="team-info"><h3>CHOCOLATE BOYS</h3></div>
                <div class="vs-box">VS</div>
                <div class="team-info"><h3 id="rakip-ad">Yükleniyor...</h3></div>
            </div>
            <div class="match-meta">
                <span><i class="fa-solid fa-calendar"></i> <span id="mac-gun">---</span></span>
                <span><i class="fa-solid fa-clock"></i> <span id="mac-saat">---</span></span>
                <span><i class="fa-solid fa-location-dot"></i> <span id="mac-saha">---</span></span>
            </div>
        </div>

        <h2 class="section-title">SON SONUÇLAR</h2>
        <div class="history-list" id="history-container">
            <p style="color:#666">Yükleniyor...</p>
        </div>
    </div>

    <footer>
        © 2026 Tüm Hakları Saklıdır.
    </footer>

    <script>
        // 1. SIRADAKİ MAÇI ÇEK (mac.json)
        fetch('/content/mac.json?t=' + Date.now()).then(res => res.json()).then(data => {
            document.getElementById('rakip-ad').innerText = data.rakip || "Rakip Bekleniyor";
            document.getElementById('mac-gun').innerText = data.mac_tarih || "Tarih Belirlenmedi";
            document.getElementById('mac-saat').innerText = data.saat || "--:--";
            document.getElementById('mac-saha').innerText = data.yer || "Saha Belirlenmedi";
        });

        // 2. GEÇMİŞ MAÇLARI LİSTELE (content/skorlar altındaki .md dosyaları)
        // NOT: Admin panelinde "skorlar" diye bir koleksiyon açarsak efsane olur.
        async function loadScores() {
            const container = document.getElementById('history-container');
            try {
                // Burada repo bilgilerini kendi bilgilerine göre güncelle aga
                const user = "chocolateboyssc-creator", repo = "takimpanel";
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/content/skorlar`);
                const files = await response.json();
                
                container.innerHTML = "";
                if(files.length === 0) container.innerHTML = "Henüz maç sonucu girilmedi.";

                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        const res = await fetch(file.download_url);
                        const text = await res.text();
                        
                        const evMatch = text.match(/ev_sahibi:\s*(.*)/);
                        const rakipMatch = text.match(/rakip:\s*(.*)/);
                        const skorMatch = text.match(/skor:\s*(.*)/);
                        const sonucMatch = text.match(/sonuc:\s*(.*)/); // galibiyet/maglubiyet

                        const item = document.createElement('div');
                        item.className = `history-item ${sonucMatch ? sonucMatch[1].trim() : ''}`;
                        item.innerHTML = `
                            <div style="text-align:right; font-weight:bold;">${evMatch ? evMatch[1] : 'CB FC'}</div>
                            <div class="score">${skorMatch ? skorMatch[1] : '0-0'}</div>
                            <div style="text-align:left; font-weight:bold;">${rakipMatch ? rakipMatch[1] : 'Rakip'}</div>
                        `;
                        container.appendChild(item);
                    }
                }
            } catch(e) { container.innerHTML = "Geçmiş maçlar henüz eklenmemiş."; }
        }
        loadScores();
    </script>
</body>
</html>
