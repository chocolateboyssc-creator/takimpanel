<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maçlar | Chocolate Boys FC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: rgba(230, 57, 70, 0.95); color: white; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px); }
        .logo-area { display: flex; align-items: center; gap: 8px; text-decoration: none; color: white; }
        .logo-area img { height: 30px; }
        nav { display: flex; overflow-x: auto; margin-left: 10px; }
        nav a { color: white; text-decoration: none; margin-left: 10px; font-weight: bold; font-size: 10px; text-transform: uppercase; white-space: nowrap; }
        nav a.active { border-bottom: 2px solid white; }

        .container { padding: 30px 5%; flex: 1; }
        .section-title { font-size: 22px; font-weight: 900; margin-bottom: 20px; border-left: 5px solid #e63946; padding-left: 15px; }

        .next-match { background: rgba(255, 255, 255, 0.1); padding: 30px 15px; border-radius: 20px; text-align: center; margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        .live-match { border: 2px solid #e63946; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(230, 57, 70, 0); } 100% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0); } }

        .match-grid { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .vs-box { background: #e63946; min-width: 70px; height: 55px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; box-shadow: 0 5px 15px rgba(230, 57, 70, 0.3); }
        .team-h { flex: 1; font-size: 16px; font-weight: 900; text-transform: uppercase; }

        .match-meta { margin-top: 20px; font-size: 14px; display: flex; justify-content: center; align-items: center; gap: 8px; flex-wrap: wrap; }
        .live-dot { color: #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .score-pill { background: #e63946; padding: 4px 12px; border-radius: 6px; font-weight: 900; font-size: 14px; }

        footer { background: #000; text-align: center; padding: 20px; border-top: 2px solid #e63946; font-size: 11px; margin-top: auto; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo-area"><img src="images/logo.png" alt="CB"></a>
        <nav><a href="index.html">ANA SAYFA</a><a href="maclar.html" class="active">MAÇLAR</a><a href="oyuncular.html">OYUNCULAR</a><a href="galeri.html">GALERİ</a></nav>
    </header>

    <div class="container">
        <h2 id="match-title" class="section-title">SIRADAKİ RANDEVU</h2>
        <div id="next-match-card" class="next-match">
            <div class="match-grid">
                <div class="team-h" style="text-align:right;">CHOCOLATE BOYS</div>
                <div id="vs-box-main" class="vs-box">VS</div>
                <div class="team-h" style="text-align:left;" id="rakip-ad">...</div>
            </div>
            <div id="match-details" class="match-meta"></div>
        </div>

        <h2 class="section-title">GEÇMİŞ SONUÇLAR</h2>
        <div id="history-container" class="history-list"></div>
    </div>

    <script>
        async function init() {
            try {
                const res = await fetch('/content/ayarlar.json?t=' + Date.now());
                const ayarlar = await res.json();
                
                if (ayarlar.canli_mac) {
                    document.getElementById('match-title').innerHTML = '<span class="live-dot">●</span> CANLI MAÇ';
                    document.getElementById('next-match-card').classList.add('live-match');
                    document.getElementById('rakip-ad').innerText = ayarlar.rakip || "RAKİP";
                    document.getElementById('vs-box-main').innerText = ayarlar.skor || "0-0";
                    
                    // Dakika ve Durum Mantığı
                    const dk = ayarlar.dakika ? ayarlar.dakika + "'" : "BAŞLADI";
                    const durum = ayarlar.durum ? ayarlar.durum : "MAÇ DEVAM EDİYOR";
                    
                    document.getElementById('match-details').innerHTML = `
                        <span style="color:#e63946; font-weight:bold;"><i class="fa-solid fa-clock"></i> ${dk}</span>
                        <span style="color:gray;">|</span>
                        <span style="text-transform:uppercase;">${durum}</span>`;
                } else {
                    const resM = await fetch('/content/mac.json');
                    const m = await resM.json();
                    document.getElementById('rakip-ad').innerText = m.rakip || "BEKLENİYOR";
                    document.getElementById('match-details').innerHTML = `<span>${m.mac_tarih || "-"}</span> | <span>${m.yer || "-"}</span>`;
                }
            } catch (e) { console.error("Veri hatası"); }
            loadScores();
        }

        async function loadScores() {
            const container = document.getElementById('history-container');
            try {
                const response = await fetch(`https://api.github.com/repos/chocolateboyssc-creator/takimpanel/contents/content/skorlar?t=` + Date.now());
                const files = await response.json();
                container.innerHTML = "";
                const mdFiles = files.filter(f => f.name.endsWith('.md')).reverse();

                for (const file of mdFiles) {
                    const res = await fetch(file.download_url);
                    const text = await res.text();
                    const getVal = (k) => text.match(new RegExp(`^${k}:\\s*(.*)`, 'im'))?.[1]?.replace(/"/g, '').trim();

                    const ev = getVal('ev_sahibi') || "CB FC";
                    const rakip = getVal('rakip') || "Rakip";
                    const skor = getVal('skor') || "0-0";
                    
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.innerHTML = `
                        <span style="flex:1; text-align:right; font-weight:bold; font-size:13px;">${ev}</span>
                        <span class="score-pill" style="margin:0 10px;">${skor}</span>
                        <span style="flex:1; text-align:left; font-weight:bold; font-size:13px;">${rakip}</span>`;
                    container.appendChild(item);
                }
            } catch(e) { container.innerHTML = "Skorlar yüklenemedi."; }
        }
        init();
    </script>
</body>
</html>
