<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oyuncular | Chocolate Boys FC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            color: #fff; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #121212;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background 0.5s ease-in-out;
        }

        /* HEADER */
        header { 
            background: rgba(230, 57, 70, 0.95); 
            color: white; padding: 10px 5%; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .logo-area { display: flex; align-items: center; gap: 8px; text-decoration: none; color: white; flex-shrink: 0; }
        .logo-area img { height: 35px; }
        .logo-area h2 { font-size: 14px; letter-spacing: 0.5px; }

        nav { 
            display: flex; 
            overflow-x: auto; 
            white-space: nowrap; 
            padding: 5px 0;
            margin-left: 15px;
            -webkit-overflow-scrolling: touch;
        }
        nav::-webkit-scrollbar { display: none; }

        nav a { 
            color: white; text-decoration: none; 
            margin-left: 12px; font-weight: bold; font-size: 10px; 
            text-transform: uppercase; flex-shrink: 0;
            opacity: 0.9;
            transition: 0.3s;
        }
        nav a:hover { opacity: 1; color: #1d3557; }
        nav a.active { border-bottom: 2px solid white; padding-bottom: 2px; opacity: 1; }

        /* SAYFA BAŞLIĞI */
        .page-header {
            text-align: center;
            padding: 40px 20px 20px;
        }
        .page-header h1 { font-size: 32px; text-transform: uppercase; text-shadow: 2px 4px 10px rgba(0,0,0,0.5); font-weight: 900; }
        .underline { width: 50px; height: 4px; background: #e63946; margin: 10px auto; border-radius: 2px; }

        /* OYUNCU GRID */
        .players-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px 5% 60px 5%;
        }

        /* OYUNCU KARTI */
        .player-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .player-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.15);
            border-color: #e63946;
        }

        .player-img-box {
            width: 100%;
            height: 300px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .player-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }
        .player-card:hover .player-img-box img { transform: scale(1.05); }
        .player-img-box i { font-size: 80px; color: rgba(255,255,255,0.2); }

        .player-info { padding: 15px; }
        .player-info h2 { font-size: 20px; margin-bottom: 8px; color: #fff; text-transform: uppercase; font-weight: 800; }
        .player-info .position { 
            display: inline-block;
            background: #e63946;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        
        .player-stats {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }
        .stat-item span { display: block; font-size: 9px; color: #ccc; text-transform: uppercase; margin-bottom: 3px; }
        .stat-item strong { font-size: 16px; color: #fff; }

        /* FOOTER */
        footer { 
            background: rgba(0, 0, 0, 0.85); 
            color: #ccc; text-align: center; padding: 40px 20px; 
            font-size: 14px; border-top: 2px solid #e63946; margin-top: auto; 
        }
        
        .footer-social { margin-top: 15px; display: flex; justify-content: center; gap: 20px; }
        .insta-btn {
            color: #fff; font-size: 28px; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.8; text-decoration: none; display: inline-block;
        }
        .insta-btn:hover {
            opacity: 1; transform: scale(1.2) rotate(5deg);
            color: #E1306C; filter: drop-shadow(0 0 8px rgba(225, 48, 108, 0.6));
        }

        @media (max-width: 600px) {
            header { flex-direction: column; padding: 12px; }
            .logo-area { margin-bottom: 8px; }
            nav { width: 100%; justify-content: center; margin-left: 0; }
            .players-container { grid-template-columns: 1fr; padding: 10px 8% 50px; }
            .page-header h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-area">
            <img src="images/logo.png" alt="CB">
            <h2>CHOCOLATE BOYS</h2>
        </a>
        <nav>
            <a href="index.html">ANA SAYFA</a>
            <a href="maclar.html">MAÇLAR</a>
            <a href="oyuncular.html" class="active">OYUNCULAR</a>
            <a href="galeri.html">GALERİ</a> 
            <a href="store.html">STORE</a>
        </nav>
    </header>

    <div class="page-header">
        <h1>TAKIM KADROSU</h1>
        <div class="underline"></div>
    </div>

    <div class="players-container" id="oyuncu-listesi">
        </div>

    <footer>
        <p>© 2026 Chocolate Boys FC. Tüm Hakları Saklıdır.</p>
        <div class="footer-social">
            <a href="#" id="insta-link" class="insta-btn" target="_blank">
                <i class="fa-brands fa-instagram"></i>
            </a>
        </div>
    </footer>

    <script>
        // Arka Plan ve Sosyal Medya Ayarları
        fetch('/content/ayarlar.json?t=' + Date.now()).then(res => res.json()).then(data => {
            const bgUrl = data.bg_image || 'https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=1600';
            document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('${bgUrl}')`;
            
            if(data.instagram_username) {
                let user = data.instagram_username.replace('@', '');
                document.getElementById('insta-link').href = "https://www.instagram.com/" + user;
            }
        });

        // OYUNCULARI PANEL VERİSİNDEN ÇEK
        async function oyuncuGetir() {
            const container = document.getElementById('oyuncu-listesi');
            try {
                const response = await fetch('/content/oyuncular.json?t=' + Date.now()); 
                if (!response.ok) throw new Error("Veri çekilemedi");
                
                const data = await response.json();
                const players = data.players || []; 
        
                if(players.length === 0) {
                    container.innerHTML = "<p style='text-align:center; width:100%; color:#aaa;'>Henüz oyuncu eklenmemiş.</p>";
                    return;
                }

                container.innerHTML = ""; 
                players.forEach(p => {
                    // Resim varsa göster, yoksa ikon koy
                    let imageContent = p.image 
                        ? `<img src="${p.image}" alt="${p.name}">` 
                        : `<i class="fa-solid fa-user-tie"></i>`;

                    container.innerHTML += `
                        <div class="player-card">
                            <div class="player-img-box">
                                ${imageContent}
                            </div>
                            <div class="player-info">
                                <h2>${p.name}</h2>
                                <span class="position">${p.position || 'OYUNCU'}</span>
                                <div class="player-stats">
                                    <div class="stat-item"><span>Maç</span><strong>${p.mac || 0}</strong></div>
                                    <div class="stat-item"><span>Gol</span><strong>${p.gol || 0}</strong></div>
                                    <div class="stat-item"><span>Asist</span><strong>${p.asist || 0}</strong></div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                container.innerHTML = "<p style='text-align:center; width:100%; color:#e63946;'>Veriler yüklenirken bir hata oluştu.</p>";
            }
        }

        window.onload = oyuncuGetir;
    </script>
</body>
</html>
